---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  TALOS_DIR: "{{.ROOT_DIR}}/talos"
  CLUSTER_NAME: homelab
  TALOS_ISO_PATH: /tmp/talos.iso
  CLUSTER_TEMPLATE_PATH: "{{.ROOT_DIR}}/talos/homelab.yaml"
  MEDIA_PRESET: homelab-iso

tasks:
  bootstrap:
    desc: "Run the full cluster provisioning (download-iso -> template-sync -> kubeconfig -> helmfile-apply)"
    cmds:
      - task: download-iso
      - task: template-sync
      - task: kubeconfig
      - task: helmfile-apply

  media-preset:
    desc: "Create (or refresh) the Omni installation media preset for the homelab ISO"
    cmds:
      - omnictl media preset delete {{.MEDIA_PRESET}} 2>/dev/null || true
      - >-
        omnictl media preset create {{.MEDIA_PRESET}}
        --arch amd64
        --secureboot
        --extensions amdgpu,amd-ucode,i915,intel-ice-firmware,intel-ucode,iscsi-tools,realtek-firmware
        --extra-kernel-args=-lockdown
        --extra-kernel-args=lockdown=integrity
        --extra-kernel-args=mitigations=off

  download-iso:
    desc: "Download Talos ISO from the homelab media preset"
    deps:
      - media-preset
    cmds:
      - rm -f {{.TALOS_ISO_PATH}}
      - omnictl media download {{.MEDIA_PRESET}} --output {{.TALOS_ISO_PATH}}

  template-sync:
    desc: "Sync the cluster template to Omni"
    cmds:
      - omnictl cluster template sync -f {{.CLUSTER_TEMPLATE_PATH}}

  kubeconfig:
    desc: "Get kubeconfig for the cluster"
    cmds:
      - omnictl kubeconfig -c {{.CLUSTER_NAME}}

  helmfile-apply:
    desc: "Apply helmfile (cilium, flux-operator, flux-instance)"
    cmds:
      - helmfile --quiet --file {{.TALOS_DIR}}/helmfile.yaml apply --skip-diff-on-install --suppress-diff
