---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rackpad
  namespace: net
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      # Run as root so the explicitly-granted NET_RAW / NET_BIND_SERVICE caps
      # are effective (k8s can't grant ambient caps to a non-root uid). The
      # container still drops every other capability below. Discovery needs
      # raw sockets for ICMP/TCP scans and to bind the SNMP trap listener.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
    controllers:
      main:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/kobii-git/rackpad
              tag: 1.7.1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_RAW          # raw sockets for ICMP / TCP discovery scans
                  - NET_BIND_SERVICE # bind the SNMP trap listener on a low port
                drop:
                  - ALL
            env:
              TZ: ${TIMEZONE}
              PORT: &port 3000
              DATABASE_PATH: /data/rackpad.db
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    ingress:
      main:
        className: private
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
        hosts:
          - host: &host rackpad.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: *port
        tls:
          - secretName: rackpad-tls
            hosts:
              - *host
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        size: 2Gi
        storageClass: nasty-iscsi
        accessMode: ReadWriteOnce
        retain: true
        globalMounts:
          - path: /data
