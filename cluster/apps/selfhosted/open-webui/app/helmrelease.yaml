---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama-ui
  namespace: selfhosted
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controllers:
      ollama-ui:
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: main
            env:
              OLLAMA_API_BASE_URL: http://ollama.selfhosted.svc.cluster.local:11434
    service:
      app:
        controller: ollama-ui
        ports:
          http:
            port: 8080
    ingress:
      app:
        className: private
        hosts:
          - host: chat.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: 8080
        tls:
          - hosts:
              - chat.${SECRET_DOMAIN}
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        size: 5Gi
        storageClass: nasty-iscsi
        accessMode: ReadWriteOnce
        retain: true
        advancedMounts:
          ollama-ui:
            app:
              - path: /app/backend/data
