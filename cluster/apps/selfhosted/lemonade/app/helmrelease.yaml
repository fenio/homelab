---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lemonade
  namespace: selfhosted
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: "node3"
    controllers:
      main:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          seed-config:
            image:
              repository: busybox
              tag: "1.38"
            command:
              - sh
              - -c
              - |
                mkdir -p /root/.cache/lemonade
                cp /seed/config.json /root/.cache/lemonade/config.json
        containers:
          main:
            image:
              repository: ghcr.io/lemonade-sdk/lemonade-server
              tag: v11.0.0
            command: ["/opt/lemonade/lemond", "--host", "0.0.0.0"]
            env:
              TZ: ${TIMEZONE}
              HSA_OVERRIDE_GFX_VERSION: "11.0.0"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /live
                    port: &port 13305
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /live
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 200m
                memory: 4Gi
                amd.com/gpu: "1"
              limits:
                memory: 32Gi
                amd.com/gpu: "1"
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    ingress:
      main:
        className: private
        hosts:
          - host: ai.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: *port
        tls:
          - hosts:
              - chat.${SECRET_DOMAIN}
    persistence:
      models:
        enabled: true
        type: persistentVolumeClaim
        size: 300Gi
        storageClass: nasty-nfs
        accessMode: ReadWriteOnce
        retain: true
        advancedMounts:
          main:
            main:
              - path: /root/.cache
            seed-config:
              - path: /root/.cache
      config:
        enabled: true
        type: configMap
        name: lemonade-config
        advancedMounts:
          main:
            seed-config:
              - path: /seed
