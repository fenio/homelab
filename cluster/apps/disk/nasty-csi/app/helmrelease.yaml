---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nasty-csi
  namespace: disk
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: ./
      sourceRef:
        kind: GitRepository
        name: nasty-chart
        namespace: flux-system
  values:
    nasty:
      url: "wss://${CONFIG_NASTY_IP}/ws"
      apiKey: ${NASTY_API_KEY}
      skipTLSVerify: true

    image:
      repository: ghcr.io/nasty-project/nasty-csi
      tag: "latest"
      pullPolicy: Always

    controller:
      replicas: 1
      logLevel: 2
      dashboard:
        enabled: true
        ingress:
          enabled: true
          className: private
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-production"
            nginx.ingress.kubernetes.io/app-root: /dashboard
          hosts:
            - host: "nasty.${SECRET_DOMAIN}"
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - "nasty.${SECRET_DOMAIN}"
              secretName: nasty-csi-dashboard-tls

    storageClasses:
      - name: nasty-nfs
        enabled: true
        protocol: nfs
        filesystem: "first"
        server: "${CONFIG_NASTY_IP}"
      - name: nasty-iscsi
        enabled: true
        protocol: iscsi
        filesystem: "first"
        server: "${CONFIG_NASTY_IP}"
      - name: nasty-nvmeof
        enabled: true
        protocol: nvmeof
        isDefault: true
        filesystem: "first"
        server: "${CONFIG_NASTY_IP}"

    snapshots:
      enabled: true

    rbac:
      create: true

    namespace: disk
